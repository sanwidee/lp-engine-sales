<div class="row">
    <div class="variant">
        <svg width="200" height="200" viewBox="0 0 72 72">
            <rect width="72" height="72" rx="16" fill="#ff2d78"/>

            <ellipse cx="28" cy="38" rx="20" ry="22" fill="white"/>
            <!-- Eyes — dots -->
            <circle cx="22" cy="34" r="2.2" fill="#ff2d78"/>
            <circle cx="34" cy="34" r="2.2" fill="#ff2d78"/>
            <!-- Smile — simple arc -->
            <path d="M22 40 Q28 46 34 40" fill="none" stroke="#ff2d78" stroke-width="2" stroke-linecap="round"/>
            <!-- Left wing -->
            <path d="M8 32 C2 28 0 22 4 18 C8 16 12 20 14 24 C16 28 12 34 8 36" fill="white"/>
            <!-- Right wing (behind page) -->
            <path d="M48 32 C52 28 56 24 56 20 C56 16 52 16 50 18 C48 22 46 28 46 32" fill="white"/>

            <rect x="44" y="26" width="22" height="30" rx="4" fill="rgba(255,255,255,0.3)"/>
            <rect x="48" y="31" width="14" height="4" rx="1.5" fill="rgba(255,255,255,0.35)"/>
            <rect x="48" y="38" width="14" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
            <rect x="48" y="42.5" width="14" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
            <rect x="50" y="48" width="10" height="3.5" rx="1.5" fill="rgba(255,255,255,0.3)"/>
        </svg>
